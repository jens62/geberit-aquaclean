esphome:
  name: aquaclean-proxy
  friendly_name: Geberit AquaClean BLE Proxy

# ---------------------------------------------------------------------------
# ESP32-C3 variant
#
# Use this file if your proxy board is an ESP32-C3 (e.g. esp32-c3-devkitm-1).
# For the regular dual-core ESP32 with WiFi use aquaclean-proxy-wifi.yaml.
# For the Olimex ESP32-POE-ISO (Ethernet) use aquaclean-proxy-eth.yaml.
#
# ⚠️  ESP32-C3 hardware differences vs regular ESP32:
#   • Single-core RISC-V CPU (vs dual-core Xtensa) — WiFi and BLE tasks
#     compete for the same CPU core, increasing GATT transfer latency.
#   • 400 KB SRAM (vs 520 KB) — less headroom for optional components.
#
# ⚠️  Keep web_server DISABLED on ESP32-C3 (see bottom of file).
#     The HTTP server adds ~30–50 KB heap usage. Combined with WiFi+BLE
#     on a single core, this pushes free heap below the ~25 KB threshold
#     where GATT operations become unreliable (connects but can't read data).
# ---------------------------------------------------------------------------

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf   # required — Arduino framework has insufficient memory for a reliable proxy
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: n   # disable BLE 5.0 — saves ~40 KB RAM
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y   # keep BLE 4.2 (all that AquaClean needs)

# ---------------------------------------------------------------------------
# WiFi
# Credentials are stored in secrets.yaml (wifi_ssid / wifi_password).
# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE   # disable WiFi power-save — avoids BLE/WiFi radio conflict on ESP32
  # Optional: static IP avoids DHCP renewals (potential WiFi/BLE radio conflict trigger).
  # Uncomment and fill in if you experience periodic WiFi drops.
  # manual_ip:
  #   static_ip: 192.168.0.160
  #   gateway: 192.168.0.1
  #   subnet: 255.255.255.0

# ---------------------------------------------------------------------------
# ESPHome native API
# The Python bridge connects to this port (default 6053) to reach the BLE proxy.
# No authentication — safe on a trusted home LAN.
# To add encryption later:
#   api:
#     encryption:
#       key: !secret api_encryption_key   # generate: openssl rand -base64 32
# ---------------------------------------------------------------------------
api:
  reboot_timeout: 15min   # reboot if no API client connects within 15 min (prevents silent hang)

# ---------------------------------------------------------------------------
# BLE Proxy
# active: true  — enables full two-way GATT connections, required for AquaClean.
# connection_slots: 1 — AquaClean only; increase only if other BLE devices are needed.
#
# interval/window: WiFi and BLE share the same 2.4 GHz radio on ESP32-C3.
# 320/200 ms (62.5% duty cycle) is carried over from the regular ESP32 config
# where it is confirmed working. Scan parameter behaviour may differ slightly
# on C3 due to the single-core coexistence scheduler; 320/200 ms is a safe
# starting point and has been reported working on C3.
# ---------------------------------------------------------------------------
esp32_ble_tracker:
  id: ble_tracker_id
  scan_parameters:
    active: true
    interval: 320ms
    window: 200ms

bluetooth_proxy:
  active: true
  connection_slots: 1

# ---------------------------------------------------------------------------
# OTA updates
# Password disabled for initial flash — uncomment after first boot if needed
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    # password: !secret ota_password

# ---------------------------------------------------------------------------
# Logging — set to INFO for normal use, DEBUG when troubleshooting.
# baud_rate: 0 disables UART logging (saves resources, avoids serial noise).
# ---------------------------------------------------------------------------
logger:
  level: INFO
  baud_rate: 0

# ---------------------------------------------------------------------------
# Restart button
# Exposed via the native API so the bridge can trigger a software reboot
# automatically when the BLE scanner gets stuck (5 consecutive E0002 failures).
# Also appears in Home Assistant for manual recovery.
# ---------------------------------------------------------------------------
button:
  - platform: restart
    name: "Restart AquaClean Proxy"

# ---------------------------------------------------------------------------
# Maintenance mode switch
# Pauses the BLE scanner to free the radio for firmware flashing or debugging.
# Toggle via Home Assistant before OTA updates.
# ---------------------------------------------------------------------------
switch:
  - platform: template
    name: "Proxy Maintenance Mode"
    id: maintenance_mode
    icon: "mdi:wrench"
    optimistic: true
    restore_mode: ALWAYS_OFF   # always start with scanner running, regardless of last saved state

# ---------------------------------------------------------------------------
# Required for debug sensors below
# ---------------------------------------------------------------------------
debug:

# ---------------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------------
sensor:
  # WiFi signal strength — reported to bridge and HACS integration as ESP32 RSSI
  - platform: wifi_signal
    name: "Proxy WiFi Signal"
    update_interval: 60s

  # Heap diagnostics — watch these values after flashing.
  # If "Proxy Max Free Block" drops below ~25 KB, GATT operations become
  # unreliable (connects OK but cannot read toilet data). Fix: disable web_server.
  - platform: debug
    free:
      name: "Proxy Free Heap"
    block:
      name: "Proxy Max Free Block"

  - platform: uptime
    name: "Proxy Uptime"

# ---------------------------------------------------------------------------
# Web interface — DISABLED on ESP32-C3 by default
#
# ⚠️  On ESP32-C3 (400 KB SRAM), enabling web_server costs ~30–50 KB heap.
#     This can push "Proxy Max Free Block" below ~25 KB, causing GATT reads
#     to time out even though the BLE connection itself succeeds.
#     Symptom: ESP32 log shows repeating connect→service_discovery→disconnect
#     every ~7 s with rsn:0x16 (local host terminated).
#
# Only uncomment if "Proxy Max Free Block" stays above 40 KB during operation.
# On a regular dual-core ESP32 with 520 KB RAM, web_server is safe to enable.
# ---------------------------------------------------------------------------
# web_server:
#   port: 80
