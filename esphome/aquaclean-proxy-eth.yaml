esphome:
  name: aquaclean-proxy
  friendly_name: Geberit AquaClean BLE Proxy

esp32:
  board: esp32-poe-iso
  framework:
    type: esp-idf   # required — Arduino framework has insufficient memory for a reliable proxy
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: n   # disable BLE 5.0 — reclaims critical SRAM for the Ethernet stack
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y   # keep BLE 4.2 (all that AquaClean needs)

# ---------------------------------------------------------------------------
# Ethernet (Olimex ESP32-POE-ISO pin mapping)
# Powered by PoE — no separate power supply needed.
# ---------------------------------------------------------------------------
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:                   # replaces deprecated clk_mode (removed in ESPHome 2026.1)
    pin: GPIO17
    mode: CLK_OUT
  phy_addr: 0
  power_pin: GPIO12      # strapping pin — required by this board, warning is expected

# ---------------------------------------------------------------------------
# ESPHome native API
# The Python bridge connects to this port (default 6053) to reach the BLE proxy.
# No authentication — safe on a trusted home LAN.
# To add encryption later:
#   api:
#     encryption:
#       key: !secret api_encryption_key   # generate: openssl rand -base64 32
# ---------------------------------------------------------------------------
api:
  reboot_timeout: 15min   # reboot if no API client connects within 15 min (prevents silent hang)

# ---------------------------------------------------------------------------
# BLE Proxy
# active: true  — enables full two-way GATT connections, required for AquaClean.
# connection_slots: 1 — AquaClean only; increase only if other BLE devices are needed.
#
# interval/window: 1100/1000 ms provides a 100ms "breather" every cycle that
# prevents the BLE radio lockup causing the ~6-hour E0002 crash on Ethernet boards.
# Do NOT set window = interval (1100/1100) — that eliminates the breather.
# ---------------------------------------------------------------------------
esp32_ble_tracker:
  id: ble_tracker_id
  scan_parameters:
    active: true
    interval: 1100ms
    window: 1000ms

bluetooth_proxy:
  active: true
  connection_slots: 1

# ---------------------------------------------------------------------------
# OTA updates
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

# ---------------------------------------------------------------------------
# Logging — set to INFO for normal use, DEBUG when troubleshooting.
# baud_rate: 0 disables UART logging (saves resources, avoids serial noise).
# ---------------------------------------------------------------------------
logger:
  level: INFO
  baud_rate: 0

# ---------------------------------------------------------------------------
# Restart button
# Exposed via the native API so the bridge can trigger a software reboot
# automatically when the BLE scanner gets stuck (5 consecutive E0002 failures).
# Also appears in the web UI (port 80) and Home Assistant for manual recovery.
# ---------------------------------------------------------------------------
button:
  - platform: restart
    name: "Restart AquaClean Proxy"

# ---------------------------------------------------------------------------
# Maintenance mode switch
# Pauses the BLE scanner to free the radio for firmware flashing or debugging.
# Toggle via the web UI or Home Assistant before OTA updates, or if the
# "Max Free Block" sensor drops below ~25 KB (memory fragmentation warning).
# ---------------------------------------------------------------------------
switch:
  - platform: template
    name: "Proxy Maintenance Mode"
    id: maintenance_mode
    icon: "mdi:wrench"
    optimistic: true
    on_turn_on:
      - esp32_ble_tracker.stop_scan:
      - lambda: |-
          ESP_LOGI("main", "Maintenance Mode ON: BLE scanner paused.");
    on_turn_off:
      - esp32_ble_tracker.start_scan:
      - lambda: |-
          ESP_LOGI("main", "Maintenance Mode OFF: BLE scanner resumed.");

# ---------------------------------------------------------------------------
# Required for debug sensors below
# ---------------------------------------------------------------------------
debug:

# ---------------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------------
sensor:
  # Heap diagnostics — useful for spotting memory leaks after long uptime.
  # If "Max Free Block" drops below ~25 KB, enable Maintenance Mode to recover.
  - platform: debug
    free:
      name: "Proxy Free Heap"
    block:
      name: "Proxy Max Free Block"

  - platform: uptime
    name: "Proxy Uptime"

# ---------------------------------------------------------------------------
# Optional: simple web interface on port 80 for status and logs
# ---------------------------------------------------------------------------
web_server:
  port: 80
