name: Update Issue Form Versions
on:
  push:
    branches: [ feat/issue-templates ]
  workflow_dispatch:
  release:
    types: [published, deleted]

permissions:
  contents: write

jobs:
  update-form:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq (optional)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Fetch latest tags (build JSON array)
        id: fetch_tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get up to 20 tags (adjust as needed)
          TAGS_JSON=$(curl -s -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/tags?per_page=100" \
            | jq -r '[.[].name] | map(select(. != null)) | .[:20] | @json')
          echo "tags=$TAGS_JSON" >> $GITHUB_OUTPUT

      - name: Debug before update
        env:
          FILE: .github/ISSUE_TEMPLATE/bug-report.yaml
          TAGS_JSON: ${{ steps.fetch_tags.outputs.tags }}
        run: |
          echo "Working directory: $(pwd)"
          echo "FILE env: $FILE"
          echo "TAGS_JSON preview: ${TAGS_JSON:0:200}"
          echo "List ISSUE_TEMPLATE directory:"
          ls -la .github/ISSUE_TEMPLATE || true

      - name: Update dropdown options for "id" version (preserve formatting)
        env:
          FILE: .github/ISSUE_TEMPLATE/bug-report.yaml
          TAGS_JSON: ${{ steps.fetch_tags.outputs.tags }}
        run: |
          python3 - <<'PY'
          import os, json, sys
          from pathlib import Path
          try:
              from ruamel.yaml import YAML
          except Exception:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "--no-cache-dir", "ruamel.yaml"])
              from ruamel.yaml import YAML

          FILE = os.environ.get("FILE")
          TAGS_JSON = os.environ.get("TAGS_JSON", "[]")

          if not FILE:
              print("ERROR: FILE env not set")
              raise SystemExit(1)
          p = Path(FILE)
          if not p.exists():
              print("ERROR: file not found:", p)
              raise SystemExit(1)

          try:
              tags = json.loads(TAGS_JSON) if TAGS_JSON and TAGS_JSON != "null" else []
          except json.JSONDecodeError:
              print("WARNING: TAGS_JSON invalid, using empty list")
              tags = []

          tags = [str(t) for t in tags]

          yaml = YAML()
          yaml.preserve_quotes = True
          data = yaml.load(p.read_text())

          # data is expected to be a sequence of form fields
          updated = False

          if isinstance(data, list):
              for field in data:
                  # find the dropdown with id == "version"
                  if isinstance(field, dict) and field.get("id") == "version":
                      attrs = field.get("attributes")
                      if attrs is None:
                          attrs = {}
                          field["attributes"] = attrs
                      # ensure options exists and is a list
                      opts = attrs.get("options")
                      # If options is a scalar string (bad), convert to list
                      if isinstance(opts, str):
                          # try to preserve existing placeholder lines if present
                          opts = [opts]
                      if opts is None:
                          opts = []
                      # preserve first two fixed entries if present
                      fixed = []
                      rest_start = 0
                      for i, o in enumerate(opts):
                          if isinstance(o, str) and (o.strip() == '--- Please select ---' or o.strip() == '{{...}}' or o.strip() == '{{...}}'):
                              fixed.append(o)
                              rest_start = i + 1
                          else:
                              break
                      # Build new options: keep fixed placeholders, then tags
                      new_opts = []
                      # keep placeholders if they existed
                      if fixed:
                          new_opts.extend(fixed)
                      else:
                          # if no placeholders, keep first two entries if they look like placeholders
                          pass
                      # append tags
                      for t in tags:
                          new_opts.append(t)
                      # assign back as YAML sequence (preserve quotes)
                      attrs["options"] = new_opts
                      updated = True
                      break

          if not updated:
              print("WARNING: did not find dropdown with id: version; no changes made")
          else:
              # write back preserving formatting
              yaml.indent(mapping=2, sequence=4, offset=2)
              p.write_text("")
              with p.open("w") as fh:
                  yaml.dump(data, fh)
              print("Updated", p)
          PY

      - name: Show diff
        run: |
          git --no-pager diff -- .github/ISSUE_TEMPLATE/bug-report.yaml || true

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/bug-report.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update release choices"
            git push
          fi
