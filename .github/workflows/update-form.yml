name: Update Issue Form Versions
on:
  push:
    branches: [ feat/issue-templates ]
  workflow_dispatch: # This gives you the manual button as a backup
  release:
    types: [published, deleted]

jobs:
  update-form:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update dropdown
        uses: ShaMan123/gha-form-dropdown-options@master
        with:
          file: .github/ISSUE_TEMPLATE/bug_report.yml
          field-id: version # This must match the 'id' in your bug_report.yml
          options: github-releases
          token: ${{ secrets.GITHUB_TOKEN }}
