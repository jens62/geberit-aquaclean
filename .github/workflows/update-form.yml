name: Update Issue Form Versions
on:
  push:
    branches: [ feat/issue-templates ]
  workflow_dispatch:
  release:
    types: [published, deleted]

permissions:
  contents: write

jobs:
  update-form:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq (optional)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Fetch latest tags (build JSON array)
        id: fetch_tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get up to 20 tags (adjust as needed)
          TAGS_JSON=$(curl -s -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/tags?per_page=100" \
            | jq -r '[.[].name] | map(select(. != null)) | .[:20] | @json')
          echo "tags=$TAGS_JSON" >> $GITHUB_OUTPUT

      - name: Debug before update
        env:
          FILE: .github/ISSUE_TEMPLATE/bug-report.yaml
          TAGS_JSON: ${{ steps.fetch_tags.outputs.tags }}
        run: |
          echo "Working directory: $(pwd)"
          echo "FILE env: $FILE"
          echo "TAGS_JSON preview: ${TAGS_JSON:0:200}"
          echo "List ISSUE_TEMPLATE directory:"
          ls -la .github/ISSUE_TEMPLATE || true

      - name: Update dropdown options between markers
        env:
          FILE: .github/ISSUE_TEMPLATE/bug-report.yaml
          TAGS_JSON: ${{ steps.fetch_tags.outputs.tags }}
        run: |
          python3 - <<'PY'
          import os, json, re, sys
          from pathlib import Path

          # Read env vars (safe with single-quoted heredoc)
          file_env = os.environ.get("FILE")
          tags_json = os.environ.get("TAGS_JSON", "[]")

          if not file_env:
              print("ERROR: FILE environment variable is not set")
              raise SystemExit(1)

          file_path = Path(file_env)
          if not file_path.exists():
              print("File not found:", file_path)
              raise SystemExit(1)

          try:
              tags = json.loads(tags_json) if tags_json and tags_json != "null" else []
          except json.JSONDecodeError:
              print("Warning: TAGS_JSON is not valid JSON, falling back to empty list")
              tags = []

          tags = [str(t) for t in tags]

          txt = file_path.read_text().splitlines()
          out = []
          i = 0
          start_marker = "# start-release-choices"
          end_marker = "# end-release-choices"
          found = False

          # Helper: find indentation for list items under options:
          def detect_list_indent(lines, start_idx):
              # look forward for first line that starts with optional spaces then '-'
              for j in range(start_idx+1, min(start_idx+10, len(lines))):
                  m = re.match(r"^(\s*)- ", lines[j])
                  if m:
                      return m.group(1)
              # fallback: use indentation of the 'options:' line + two spaces
              m_opt = re.match(r"^(\s*)\S", lines[start_idx])
              base = m_opt.group(1) if m_opt else ""
              return base + "  "

          while i < len(txt):
              line = txt[i]
              out.append(line)
              if line.strip() == start_marker:
                  found = True
                  # determine indentation for the inserted '- item' lines
                  # try to detect from following lines; if not found, fallback to indent of marker line
                  list_indent = detect_list_indent(txt, i)
                  # ensure list_indent ends at column before '-' (no extra spaces)
                  # insert tag lines with that indentation
                  for t in tags:
                      t_escaped = t.replace("'", "''")
                      out.append(f"{list_indent}- '{t_escaped}'")
                  # skip original lines until end_marker
                  j = i + 1
                  while j < len(txt) and txt[j].strip() != end_marker:
                      j += 1
                  if j < len(txt):
                      out.append(txt[j])  # append end_marker
                      i = j
                  else:
                      out.append(end_marker)
                      i = j
              i += 1

          if not found:
              # fallback: append marker block at end of file with reasonable indentation
              out.append("")
              out.append("      # start-release-choices")
              for t in tags:
                  t_escaped = t.replace("'", "''")
                  out.append(f"        - '{t_escaped}'")
              out.append("      # end-release-choices")

          file_path.write_text("\n".join(out) + "\n")
          print("Updated", file_path)
          PY

      - name: Show diff
        run: |
          git --no-pager diff -- .github/ISSUE_TEMPLATE/bug-report.yaml || true

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/bug-report.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update release choices"
            git push
          fi
