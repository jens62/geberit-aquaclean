name: Update Issue Form Versions
on:
  push:
    branches: [ feat/issue-templates ]
  workflow_dispatch: # This gives you the manual button as a backup
  release:
    types: [published, deleted]

permissions:
  contents: write  # This allows the action to commit the changes

jobs:
  update-form:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update dropdown
        uses: ShaMan123/gha-form-dropdown-options@main
        with:
          # Changed 'file' to 'form'
          form: .github/ISSUE_TEMPLATE/bug-report.yaml 
          # Changed 'field-id' to 'dropdown'
          dropdown: version 
          # This is the 'magic' line from the template
          options: |
            -
          # Use 'strategy' to actually fetch the data
          strategy: github-tags 
          # Changed 'token' to 'github_token'
          github_token: ${{ secrets.GITHUB_TOKEN }}
