views:
  - title: AquaClean
    path: aquaclean
    cards:
      - type: entities
        title: ORIENTATION LIGHT
        show_header_toggle: false
        entities:
          - entity: number.geberit_aquaclean_orientation_light_activation
            name: Activation
          - type: custom:numberbox-card
            entity: number.geberit_aquaclean_orientation_light_brightness
            name: Brightness
            icon: mdi:brightness-7
          - entity: number.geberit_aquaclean_orientation_light_color
            name: Current Color Index
          - type: custom:paper-buttons-row
            buttons:
              - icon: mdi:circle
                style:
                  button:
                    background: "#FFF4E0"
                tap_action:
                  action: call-service
                  service: number.set_value
                  service_data:
                    entity_id: number.geberit_aquaclean_orientation_light_color
                    value: 1
              - icon: mdi:circle
                style:
                  button:
                    background: "#FEEB75"
