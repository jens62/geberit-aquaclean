# Geberit AquaClean Mera Comfort — Lovelace Dashboard
#
# How to import:
#   Settings → Dashboards → Add Dashboard → Start with empty dashboard
#   Open dashboard → Edit → Raw configuration editor → paste this file
#
# All entity IDs assume the default device name "Geberit AquaClean".
# If you renamed the device in Settings → Devices, adjust the slugified
# prefix accordingly (e.g. "my_aquaclean" instead of "geberit_aquaclean").
#
# Prerequisites (HACS Frontend):
#   - custom:timer-bar-card  (Poll Status progress bar)
#
# Prerequisites (configuration.yaml):
#   - Signal quality template sensors  →  homeassistant/SETUP_GUIDE.md § Signal quality template sensors
#

title: Geberit AquaClean
views:
  - title: Overview
    path: aquaclean
    icon: mdi:toilet
    cards:

      # ── Language selector (optional) ──────────────────────────────────────
      # Requires an input_text.frontend_language helper in HA.
      - type: markdown
        content: |
          {% set lang = states('input_text.frontend_language') %} {% if
          lang.startswith('de') %} Hallo — aktuelle Sprache: {{ lang }} {% else
          %} Hello — current language: {{ lang }} {% endif %}

      # ── BLE Connection ────────────────────────────────────────────────────
      # Mirrors the webapp's connection panel.
      - type: entities
        title: BLE Connection
        icon: mdi:bluetooth
        entities:
          - entity: binary_sensor.geberit_aquaclean_ble_connected
            name: Connected
          - entity: sensor.geberit_aquaclean_ble_connection
            name: Connection
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: connected_at
            name: Connected Since
            icon: mdi:clock-check
          - entity: sensor.ble_signal_quality
            name: BLE Signal
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: error_code
            name: Error Code
            icon: mdi:alert-decagram-outline
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: error_hint
            name: Error Hint
            icon: mdi:alert-circle-outline

      # ── ESPHome Proxy ─────────────────────────────────────────────────────
      # Only shown when an ESPHome proxy is configured.
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.aquaclean_proxy_connected
            state_not: unavailable
          - condition: state
            entity: binary_sensor.aquaclean_proxy_connected
            state_not: unknown
        card:
          type: entities
          title: ESPHome Proxy
          icon: mdi:lan
          entities:
            - entity: binary_sensor.aquaclean_proxy_connected
              name: Connected
            - entity: sensor.aquaclean_proxy_connection
              name: Connection
            - entity: sensor.wifi_signal_quality
              name: WiFi Signal
            - type: attribute
              entity: binary_sensor.aquaclean_proxy_connected
              attribute: error_code
              name: Error Code
              icon: mdi:alert-decagram-outline
            - type: attribute
              entity: binary_sensor.aquaclean_proxy_connected
              attribute: error_hint
              name: Error Hint
              icon: mdi:alert-circle-outline

      # ── Performance Statistics ────────────────────────────────────────────
      # Session totals, reset on HA restart. WiFi row hidden without ESPHome proxy.
      - type: markdown
        title: Performance Statistics
        icon: mdi:chart-bar
        content: >
          | Metric | Min | Avg | Max | Last |

          |--------|----:|----:|----:|-----:|

          | Connect | {{ states('sensor.geberit_aquaclean_min_connect') }} ms |
          {{ states('sensor.geberit_aquaclean_avg_connect') }} ms | {{
          states('sensor.geberit_aquaclean_max_connect') }} ms | {{
          states('sensor.geberit_aquaclean_last_connect') }} ms |

          | Poll (GATT) | {{ states('sensor.geberit_aquaclean_min_poll') }} ms |
          {{ states('sensor.geberit_aquaclean_avg_poll') }} ms | {{
          states('sensor.geberit_aquaclean_max_poll') }} ms | {{
          states('sensor.geberit_aquaclean_last_poll_ms') }} ms |

          | BLE RSSI | {{ states('sensor.geberit_aquaclean_min_ble_rssi') }} dBm
          | {{ states('sensor.geberit_aquaclean_avg_ble_rssi') }} dBm | {{
          states('sensor.geberit_aquaclean_max_ble_rssi') }} dBm | {{
          states('sensor.geberit_aquaclean_ble_signal') }} dBm |

          {%- if 'sensor.geberit_aquaclean_min_wifi_rssi' in states %}

          | WiFi RSSI | {{ states('sensor.geberit_aquaclean_min_wifi_rssi') }}
          dBm | {{ states('sensor.geberit_aquaclean_avg_wifi_rssi') }} dBm | {{
          states('sensor.geberit_aquaclean_max_wifi_rssi') }} dBm | {{
          states('sensor.aquaclean_proxy_wifi_signal') }} dBm |

          {%- endif %}


          Transport: `{{ states('sensor.geberit_aquaclean_transport') }}`
          &nbsp;·&nbsp; {{ states('sensor.geberit_aquaclean_poll_samples') }}
          samples this session

      # ── Live Status ──────────────────────────────────────────────────────
      - type: entities
        title: Live Status
        icon: mdi:information-outline
        entities:
          - entity: binary_sensor.geberit_aquaclean_user_sitting
            name: User Sitting
          - entity: binary_sensor.geberit_aquaclean_anal_shower_running
            name: Anal Shower
          - entity: binary_sensor.geberit_aquaclean_lady_shower_running
            name: Lady Shower
          - entity: binary_sensor.geberit_aquaclean_dryer_running
            name: Dryer

      # ── Controls ──────────────────────────────────────────────────────────
      # Stop: halts any running shower (anal/lady) and dryer.
      # It does NOT stop a moving lid — press Toggle Lid again to reverse the lid.
      # Typical pattern: Stop → Toggle Lid (confirmed from iPhone OTA capture).
      - type: grid
        title: Controls
        square: false
        columns: 2
        cards:
          - type: button
            name: Toggle Lid
            icon: geberit:adjustabletoiletseat
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_toggle_lid
          - type: button
            name: Stop Shower/Dryer
            icon: mdi:stop-circle-outline
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_stop
          - type: button
            name: Reset Filter Counter
            icon: geberit:filter
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_reset_filter_counter
          - type: button
            name: Trigger Flush
            icon: geberit:flush
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_trigger_flush_manually

      # ── Poll Status ───────────────────────────────────────────────────────
      # Requires custom:timer-bar-card (HACS → Frontend → "Timer Bar Card").
      - type: entities
        title: Poll Status
        icon: mdi:timer-outline
        entities:
          - entity: sensor.geberit_aquaclean_next_poll
            name: Next Poll
          - entity: sensor.geberit_aquaclean_last_poll
            name: Last Poll
          - entity: sensor.geberit_aquaclean_poll_interval
            name: Poll Interval
          - type: conditional
            conditions:
              - entity: binary_sensor.geberit_aquaclean_ble_connected
                state: "off"
            row:
              type: custom:timer-bar-card
              entity: sensor.geberit_aquaclean_next_poll
              guess_mode: true
              full_row: true
              start_time:
                entity: sensor.geberit_aquaclean_last_poll
              end_time:
                entity: sensor.geberit_aquaclean_next_poll
              text: Nächster Poll in {remaining}
              invert: true
              bar_height: 10px
              bar_foreground: var(--state-icon-color)
              bar_background: transparent
              layout: hide_name
          - type: conditional
            conditions:
              - entity: binary_sensor.geberit_aquaclean_ble_connected
                state: "on"
            row:
              type: custom:timer-bar-card
              entity: binary_sensor.geberit_aquaclean_ble_connected
              active_state: "off"
              translations:
                "on": on request
              full_row: true
              layout: hide_name

      # ── Descaling ─────────────────────────────────────────────────────────
      # descaling_state: 0=Idle 1=Preparing (~55 s) 2=Waiting for descaler 3=Running
      # descaling_duration_min: countdown minutes (meaningful only when state=3)
      - type: entities
        title: Descale
        icon: geberit:descaling
        entities:
          - entity: sensor.geberit_aquaclean_descaling_state
            name: Descaling State
          - entity: sensor.geberit_aquaclean_descaling_duration
            name: Descaling Duration
          - entity: sensor.geberit_aquaclean_days_until_next_descale
            name: Days Until Next Descale
          - entity: sensor.geberit_aquaclean_days_until_shower_restricted
            name: Days Until Shower Restricted
          - entity: sensor.geberit_aquaclean_last_descale
            name: Last Descale
          - entity: sensor.geberit_aquaclean_number_of_descale_cycles
            name: Descale Cycles
          - entity: sensor.geberit_aquaclean_shower_cycles_until_confirmation
            name: Shower Cycles Until Confirmation
          - entity: sensor.geberit_aquaclean_unposted_shower_cycles
            name: Unposted Shower Cycles

      # ── Ceramic Honeycomb Filter ──────────────────────────────────────────
      - type: entities
        title: Ceramic Honeycomb Filter
        icon: geberit:filter
        entities:
          - entity: sensor.geberit_aquaclean_days_until_filter_change
            name: Days Until Filter Change
          - entity: sensor.geberit_aquaclean_next_filter_change
            name: Next Filter Change
          - entity: sensor.geberit_aquaclean_last_filter_reset
            name: Last Filter Reset
          - entity: sensor.geberit_aquaclean_filter_reset_count
            name: Filter Reset Count

      # ── User Profile Settings ─────────────────────────────────────────────
      # number entities render as sliders — tap the value to type, or drag.

      - type: entities
        title: Anal Shower
        icon: geberit:analshower
        entities:
          - entity: number.geberit_aquaclean_water_temperature
            name: Water Temperature
          - entity: number.geberit_aquaclean_anal_shower_position
            name: Spray Arm Position
          - entity: number.geberit_aquaclean_anal_shower_pressure
            name: Spray Intensity
          - entity: number.geberit_aquaclean_oscillator_state
            name: Oscillation (0=Off, 1=On)

      - type: entities
        title: Lady Shower
        icon: geberit:ladywash
        entities:
          - entity: number.geberit_aquaclean_water_temperature
            name: Water Temperature (shared)
          - entity: number.geberit_aquaclean_lady_shower_position
            name: Spray Arm Position
          - entity: number.geberit_aquaclean_lady_shower_pressure
            name: Spray Intensity

      - type: entities
        title: Dryer
        icon: geberit:airdryer
        entities:
          - entity: number.geberit_aquaclean_dryer_state
            name: Dryer (0=Off, 1=On)
          - entity: number.geberit_aquaclean_dryer_temperature
            name: Air Temperature
          - entity: number.geberit_aquaclean_dryer_spray_intensity
            name: Spray Intensity

      # ── Orientation Light ─────────────────────────────────────────────────
      # Buttons apply immediately via proc 0x0B (confirmed live 2026-06-04).
      # Number entities control stored settings (power cycle to persist).
      - type: entities
        title: Orientation Light
        icon: geberit:light
        entities:
          - type: buttons
            entities:
              - entity: button.geberit_aquaclean_orientation_light_off
                name: "Off"
              - entity: button.geberit_aquaclean_orientation_light_on
                name: "On"
              - entity: button.geberit_aquaclean_orientation_light_when_approached
                name: When Approached
          - entity: number.geberit_aquaclean_orientation_light_activation
            name: Activation (0=Off, 1=On, 2=When Approached)
          - entity: number.geberit_aquaclean_orientation_light_brightness
            name: Brightness
          - entity: number.geberit_aquaclean_orientation_light_color
            name: >-
              Color
              (0=Blue,1=Turquoise,2=Magenta,3=Orange,4=Yellow,5=WarmWhite,6=ColdWhite)

      # ── Odour Extraction ──────────────────────────────────────────────────
      - type: entities
        title: Odour Extraction
        icon: geberit:odourextraction
        entities:
          - type: buttons
            entities:
              - entity: button.geberit_aquaclean_toggle_odour_extraction
                name: Toggle
              - entity: button.geberit_aquaclean_odour_extraction_run_on
                name: Run-On
          - entity: number.geberit_aquaclean_odour_extraction
            name: Odour Extraction (0=Off, 1=On)
          - entity: number.geberit_aquaclean_odour_extraction_run_on
            name: Run-On (0=Off, 1=On)

      # ── WC Lid ────────────────────────────────────────────────────────────
      - type: entities
        title: WC Lid
        icon: geberit:adjustabletoiletseat
        entities:
          - entity: number.geberit_aquaclean_wc_lid_sensor_sensitivity
            name: Sensor Sensitivity
          - entity: number.geberit_aquaclean_wc_lid_open_automatically
            name: Open Automatically (0=Off, 1=On)
          - entity: number.geberit_aquaclean_wc_lid_close_automatically
            name: Close Automatically (0=Off, 1=On)

      - type: entities
        title: Seat Heating
        icon: geberit:toiletseatheater
        entities:
          - entity: number.geberit_aquaclean_wc_seat_heat
            name: Temperature

      # ── Calibration ───────────────────────────────────────────────────────
      # Offsets set via lid/shower arm calibration. Non-zero = user has adjusted
      # the default position. Read from SPL params 12 and 13.
      - type: entities
        title: Calibration
        icon: mdi:tune
        entities:
          - entity: sensor.geberit_aquaclean_lid_offset_position
            name: Lid Offset Position
          - entity: sensor.geberit_aquaclean_spray_arm_offset_position
            name: Spray Arm Offset Position

      # ── Device Information ────────────────────────────────────────────────
      - type: entities
        title: Device Information
        icon: mdi:information
        show_header_toggle: false
        entities:
          - entity: sensor.geberit_aquaclean_model
            name: Model
          - entity: sensor.geberit_aquaclean_serial_number
            name: Serial Number
          - entity: sensor.geberit_aquaclean_sap_number
            name: SAP Number
          - entity: sensor.geberit_aquaclean_production_date
            name: Production Date
          - entity: sensor.geberit_aquaclean_initial_operation_date
            name: Initial Operation Date
          - entity: sensor.geberit_aquaclean_soc_versions
            name: SOC Versions
          - entity: sensor.geberit_aquaclean_firmware_version
            name: Firmware Version
