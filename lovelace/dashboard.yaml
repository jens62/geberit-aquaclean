# Geberit AquaClean — Example Lovelace Dashboard
#
# How to import:
#   Settings → Dashboards → Add Dashboard → Start with empty dashboard
#   Open dashboard → Edit → Raw configuration editor → paste this file
#
# All entity IDs assume the default device name "Geberit AquaClean".
# If you renamed the device in Settings → Devices, adjust the slugified
# prefix accordingly (e.g. "my_aquaclean" instead of "geberit_aquaclean").
#
# OPTIONAL — Poll countdown gauge:
#   HA's Raw config editor strips all comments on save, so the commented-out
#   gauge card below will be gone after your first save.  Add it manually
#   after saving, or see docs/hacs-integration.md for the complete paste-ready
#   YAML snippet and the required template sensor (configuration.yaml).
#
#   Template sensor (configuration.yaml) — use time_pattern trigger so the
#   gauge drains smoothly every 30 s instead of only updating once per poll:
#
#   template:
#     - trigger:
#         - platform: time_pattern
#           seconds: "/30"
#       sensor:
#         - name: "AquaClean Poll Countdown"
#           unit_of_measurement: "%"
#           state: >
#             {% if states('sensor.geberit_aquaclean_next_poll') not in ['unknown','unavailable',''] %}
#               {% set nxt_ts = as_timestamp(states('sensor.geberit_aquaclean_next_poll')) %}
#               {% set now_ts = as_timestamp(now()) %}
#               {% set iv = states('sensor.geberit_aquaclean_poll_interval') | float(300) %}
#               {% if nxt_ts and nxt_ts > now_ts %}
#                 {% set pct = ((nxt_ts - now_ts) / iv) * 100 %}
#                 {{ [ [pct | int, 0] | max, 100 ] | min }}
#               {% else %}
#                 0
#               {% endif %}
#             {% else %}
#               unavailable
#             {% endif %}

title: Geberit AquaClean
views:
  - title: Overview
    path: aquaclean
    icon: mdi:toilet
    cards:

      # ── Connection Status ─────────────────────────────────────────────────
      # Mirrors the webapp's two connection panels.
      # Note: "connecting" state is not shown in HACS (on-demand BLE — connects
      # and disconnects within each poll). Sensors show result of last poll.
      - type: entities
        title: BLE Connection
        icon: mdi:bluetooth
        entities:
          - entity: binary_sensor.geberit_aquaclean_ble_connected
            name: Connected
          - entity: sensor.geberit_aquaclean_ble_connection
            name: Connection

      # Only relevant when an ESPHome proxy host is configured
      - type: entities
        title: ESPHome Proxy
        icon: mdi:lan
        entities:
          - entity: binary_sensor.aquaclean_proxy_connected
            name: Connected
          - entity: sensor.aquaclean_proxy_connection
            name: Connection

      # ── Live Status ──────────────────────────────────────────────────────
      - type: entities
        title: Live Status
        icon: mdi:information-outline
        entities:
          - entity: binary_sensor.geberit_aquaclean_user_sitting
            name: User Sitting
          - entity: binary_sensor.geberit_aquaclean_anal_shower_running
            name: Anal Shower
          - entity: binary_sensor.geberit_aquaclean_lady_shower_running
            name: Lady Shower
          - entity: binary_sensor.geberit_aquaclean_dryer_running
            name: Dryer

      # ── Controls ─────────────────────────────────────────────────────────
      - type: grid
        title: Controls
        square: false
        columns: 2
        cards:
          - type: button
            name: Toggle Lid
            icon: geberit:adjustabletoiletseat
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_toggle_lid

          # Only visible when ESPHome proxy is configured
          - type: button
            name: Restart Proxy
            icon: mdi:restart
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.aquaclean_proxy_restart_aquaclean_proxy

      # ── Poll Status ───────────────────────────────────────────────────────
      # sensor.next_poll has device_class: timestamp → HA shows "in X minutes"
      - type: entities
        title: Poll Status
        icon: mdi:timer-outline
        entities:
          - entity: sensor.geberit_aquaclean_next_poll
            name: Next Poll
          - entity: sensor.geberit_aquaclean_last_poll
            name: Last Poll
          - entity: sensor.geberit_aquaclean_poll_interval
            name: Poll Interval

      # Optional gauge — requires the template sensor above
      # - type: gauge
      #   title: Next Poll
      #   entity: sensor.aquaclean_poll_countdown
      #   min: 0
      #   max: 100
      #   needle: true
      #   severity:
      #     green: 50
      #     yellow: 20
      #     red: 5

      # ── Descale ───────────────────────────────────────────────────────────
      - type: entities
        title: Descale
        icon: mdi:water-remove
        entities:
          - entity: sensor.geberit_aquaclean_days_until_next_descale
            name: Days Until Next Descale
          - entity: sensor.geberit_aquaclean_days_until_shower_restricted
            name: Days Until Shower Restricted
          - entity: sensor.geberit_aquaclean_last_descale
            name: Last Descale
          - entity: sensor.geberit_aquaclean_number_of_descale_cycles
            name: Descale Cycles
          - entity: sensor.geberit_aquaclean_shower_cycles_until_confirmation
            name: Shower Cycles Until Confirmation
          - entity: sensor.geberit_aquaclean_unposted_shower_cycles
            name: Unposted Shower Cycles

      # ── Device Information ────────────────────────────────────────────────
      - type: entities
        title: Device Information
        icon: mdi:information
        show_header_toggle: false
        entities:
          - entity: sensor.geberit_aquaclean_model
            name: Model
          - entity: sensor.geberit_aquaclean_serial_number
            name: Serial Number
          - entity: sensor.geberit_aquaclean_sap_number
            name: SAP Number
          - entity: sensor.geberit_aquaclean_production_date
            name: Production Date
          - entity: sensor.geberit_aquaclean_initial_operation_date
            name: Initial Operation Date
          - entity: sensor.geberit_aquaclean_soc_versions
            name: SOC Versions
