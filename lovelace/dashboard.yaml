# Geberit AquaClean — Example Lovelace Dashboard
#
# How to import:
#   Settings → Dashboards → Add Dashboard → Start with empty dashboard
#   Open dashboard → Edit → Raw configuration editor → paste this file
#
# All entity IDs assume the default device name "Geberit AquaClean".
# If you renamed the device in Settings → Devices, adjust the slugified
# prefix accordingly (e.g. "my_aquaclean" instead of "geberit_aquaclean").
#

title: Geberit AquaClean
views:
  - title: Overview
    path: aquaclean
    icon: mdi:toilet
    cards:

      # ── Connection Status ─────────────────────────────────────────────────
      # Mirrors the webapp's two connection panels.
      # Sensors cycle: connecting → connected → disconnected within each poll.
      - type: entities
        title: BLE Connection
        icon: mdi:bluetooth
        entities:
          - entity: binary_sensor.geberit_aquaclean_ble_connected
            name: Connected
          - entity: sensor.geberit_aquaclean_ble_connection
            name: Connection
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: connected_at
            name: Connected Since
            icon: mdi:clock-check
          - entity: sensor.ble_signal_quality
            name: BLE Signal
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: error_code
            name: Error Code
            icon: mdi:alert-decagram-outline
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: error_hint
            name: Error Hint
            icon: mdi:alert-circle-outline

      # Only relevant when an ESPHome proxy host is configured
      - type: entities
        title: ESPHome Proxy
        icon: mdi:lan
        entities:
          - entity: binary_sensor.aquaclean_proxy_connected
            name: Connected
          - entity: sensor.aquaclean_proxy_connection
            name: Connection
          - entity: sensor.wifi_signal_quality
            name: WiFi Signal
          - type: attribute
            entity: binary_sensor.aquaclean_proxy_connected
            attribute: error_code
            name: Error Code
            icon: mdi:alert-decagram-outline
          - type: attribute
            entity: binary_sensor.aquaclean_proxy_connected
            attribute: error_hint
            name: Error Hint
            icon: mdi:alert-circle-outline


      # Performance statistics table — only relevant with ESPHome proxy
      # All sensors reset to zero when HA restarts (session statistics only).
      - type: markdown
        title: Performance Statistics
        icon: mdi:chart-bar
        content: |
          | Metric | Min | Avg | Max | Last |
          |--------|----:|----:|----:|-----:|
          | Connect | {{ states('sensor.aquaclean_proxy_min_connect') }} ms | {{ states('sensor.aquaclean_proxy_avg_connect') }} ms | {{ states('sensor.aquaclean_proxy_max_connect') }} ms | {{ states('sensor.aquaclean_proxy_last_connect') }} ms |
          | Poll (GATT) | {{ states('sensor.aquaclean_proxy_min_poll') }} ms | {{ states('sensor.aquaclean_proxy_avg_poll') }} ms | {{ states('sensor.aquaclean_proxy_max_poll') }} ms | {{ states('sensor.aquaclean_proxy_last_poll') }} ms |
          | BLE RSSI | {{ states('sensor.aquaclean_proxy_min_ble_rssi') }} dBm | {{ states('sensor.aquaclean_proxy_avg_ble_rssi') }} dBm | {{ states('sensor.aquaclean_proxy_max_ble_rssi') }} dBm | {{ states('sensor.geberit_aquaclean_ble_signal') }} dBm |
          | WiFi RSSI | {{ states('sensor.aquaclean_proxy_min_wifi_rssi') }} dBm | {{ states('sensor.aquaclean_proxy_avg_wifi_rssi') }} dBm | {{ states('sensor.aquaclean_proxy_max_wifi_rssi') }} dBm | {{ states('sensor.aquaclean_proxy_wifi_signal') }} dBm |

          Transport: `{{ states('sensor.aquaclean_proxy_transport') }}` &nbsp;·&nbsp; {{ states('sensor.aquaclean_proxy_poll_samples') }} samples this session

      # ── Live Status ──────────────────────────────────────────────────────
      - type: entities
        title: Live Status
        icon: mdi:information-outline
        entities:
          - entity: binary_sensor.geberit_aquaclean_user_sitting
            name: User Sitting
          - entity: binary_sensor.geberit_aquaclean_anal_shower_running
            name: Anal Shower
          - entity: binary_sensor.geberit_aquaclean_lady_shower_running
            name: Lady Shower
          - entity: binary_sensor.geberit_aquaclean_dryer_running
            name: Dryer

      # ── Controls ─────────────────────────────────────────────────────────
      - type: grid
        title: Controls
        square: false
        columns: 2
        cards:
          - type: button
            name: Toggle Lid
            icon: geberit:adjustabletoiletseat
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_toggle_lid

          # Only visible when ESPHome proxy is configured
          - type: button
            name: Restart Proxy
            icon: mdi:restart
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.aquaclean_proxy_restart_aquaclean_proxy

      # ── Poll Status ───────────────────────────────────────────────────────
      # sensor.next_poll has device_class: timestamp → HA shows "in X minutes"
      #
      # The progress bar (custom:timer-bar-card) must be installed via HACS:
      #   HACS → Frontend → search "Timer Bar Card" → Install → reload browser
      - type: entities
        title: Poll Status
        icon: mdi:timer-outline
        entities:
          - entity: sensor.geberit_aquaclean_next_poll
            name: Next Poll
          - entity: sensor.geberit_aquaclean_last_poll
            name: Last Poll
          - entity: sensor.geberit_aquaclean_poll_interval
            name: Poll Interval
          # Progress bar — drains from last poll to next poll.
          # active_state: "on" uses the BLE binary sensor to gate visibility:
          # bar shows when polling is healthy, disappears on connection failure.
          - type: custom:timer-bar-card
            entity: binary_sensor.geberit_aquaclean_ble_connected
            active_state: "on"
            full_row: true
            start_time:
              entity: sensor.geberit_aquaclean_last_poll
            end_time:
              entity: sensor.geberit_aquaclean_next_poll
            text: Nächster Poll in {remaining}
            bar_height: 15px
            bar_foreground: "#2196F3"
            bar_background: "#263238"
            layout: hide_name

      # ── Descale ───────────────────────────────────────────────────────────
      - type: entities
        title: Descale
        icon: mdi:water-remove
        entities:
          - entity: sensor.geberit_aquaclean_days_until_next_descale
            name: Days Until Next Descale
          - entity: sensor.geberit_aquaclean_days_until_shower_restricted
            name: Days Until Shower Restricted
          - entity: sensor.geberit_aquaclean_last_descale
            name: Last Descale
          - entity: sensor.geberit_aquaclean_number_of_descale_cycles
            name: Descale Cycles
          - entity: sensor.geberit_aquaclean_shower_cycles_until_confirmation
            name: Shower Cycles Until Confirmation
          - entity: sensor.geberit_aquaclean_unposted_shower_cycles
            name: Unposted Shower Cycles

      # ── Device Information ────────────────────────────────────────────────
      - type: entities
        title: Device Information
        icon: mdi:information
        show_header_toggle: false
        entities:
          - entity: sensor.geberit_aquaclean_model
            name: Model
          - entity: sensor.geberit_aquaclean_serial_number
            name: Serial Number
          - entity: sensor.geberit_aquaclean_sap_number
            name: SAP Number
          - entity: sensor.geberit_aquaclean_production_date
            name: Production Date
          - entity: sensor.geberit_aquaclean_initial_operation_date
            name: Initial Operation Date
          - entity: sensor.geberit_aquaclean_soc_versions
            name: SOC Versions
