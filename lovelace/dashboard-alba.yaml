# Geberit AquaClean Alba — Lovelace Dashboard
#
# How to import:
#   Settings → Dashboards → Add Dashboard → Start with empty dashboard
#   Open dashboard → Edit → Raw configuration editor → paste this file
#
# All entity IDs assume the default device name "Geberit AquaClean".
# If you renamed the device in Settings → Devices, adjust the slugified
# prefix accordingly (e.g. "my_aquaclean" instead of "geberit_aquaclean").
#
# Prerequisites (HACS Frontend):
#   - custom:timer-bar-card  (Poll Status progress bar)
#
# Prerequisites (configuration.yaml):
#   - Signal quality template sensors  →  homeassistant/SETUP_GUIDE.md § Signal quality template sensors
#

title: Geberit AquaClean Alba
views:
  - title: Overview
    path: aquaclean_alba
    icon: mdi:toilet
    cards:

      # ── Language selector ─────────────────────────────────────────────────
      - type: markdown
        content: |
          {% set lang = states('input_text.frontend_language') %} {% if
          lang.startswith('de') %} Hallo — aktuelle Sprache: {{ lang }} {% else
          %} Hello — current language: {{ lang }} {% endif %}

      # ── BLE Connection ────────────────────────────────────────────────────
      - type: entities
        title: BLE Connection
        icon: mdi:bluetooth
        entities:
          - entity: binary_sensor.geberit_aquaclean_ble_connected
            name: Connected
          - entity: sensor.geberit_aquaclean_ble_connection
            name: Connection
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: connected_at
            name: Connected Since
            icon: mdi:clock-check
          - entity: sensor.ble_signal_quality
            name: BLE Signal
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: error_code
            name: Error Code
            icon: mdi:alert-decagram-outline
          - type: attribute
            entity: binary_sensor.geberit_aquaclean_ble_connected
            attribute: error_hint
            name: Error Hint
            icon: mdi:alert-circle-outline

      # ── ESPHome Proxy ─────────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.aquaclean_proxy_connected
            state_not: unavailable
          - condition: state
            entity: binary_sensor.aquaclean_proxy_connected
            state_not: unknown
        card:
          type: entities
          title: ESPHome Proxy
          icon: mdi:lan
          entities:
            - entity: binary_sensor.aquaclean_proxy_connected
              name: Connected
            - entity: sensor.aquaclean_proxy_connection
              name: Connection
            - entity: sensor.wifi_signal_quality
              name: WiFi Signal
            - entity: sensor.aquaclean_proxy_free_heap
              name: Free Heap
            - entity: sensor.aquaclean_proxy_max_free_block
              name: Max Free Block
            - type: attribute
              entity: binary_sensor.aquaclean_proxy_connected
              attribute: error_code
              name: Error Code
              icon: mdi:alert-decagram-outline
            - type: attribute
              entity: binary_sensor.aquaclean_proxy_connected
              attribute: error_hint
              name: Error Hint
              icon: mdi:alert-circle-outline
            - type: buttons
              entities:
                - entity: button.aquaclean_proxy_restart_aquaclean_proxy
                  name: Restart Proxy

      # ── Performance Statistics ────────────────────────────────────────────
      - type: markdown
        title: Performance Statistics
        icon: mdi:chart-bar
        content: >
          | Metric | Min | Avg | Max | Last |

          |--------|----:|----:|----:|-----:|

          | Connect | {{ states('sensor.geberit_aquaclean_min_connect') }} ms |
          {{ states('sensor.geberit_aquaclean_avg_connect') }} ms | {{
          states('sensor.geberit_aquaclean_max_connect') }} ms | {{
          states('sensor.geberit_aquaclean_last_connect') }} ms |

          | Poll (GATT) | {{ states('sensor.geberit_aquaclean_min_poll') }} ms |
          {{ states('sensor.geberit_aquaclean_avg_poll') }} ms | {{
          states('sensor.geberit_aquaclean_max_poll') }} ms | {{
          states('sensor.geberit_aquaclean_last_poll_ms') }} ms |

          | BLE RSSI | {{ states('sensor.geberit_aquaclean_min_ble_rssi') }} dBm
          | {{ states('sensor.geberit_aquaclean_avg_ble_rssi') }} dBm | {{
          states('sensor.geberit_aquaclean_max_ble_rssi') }} dBm | {{
          states('sensor.geberit_aquaclean_ble_rssi') }} dBm |

          {%- if 'sensor.aquaclean_proxy_min_wifi_rssi' in states %}

          | WiFi RSSI | {{ states('sensor.aquaclean_proxy_min_wifi_rssi') }}
          dBm | {{ states('sensor.aquaclean_proxy_avg_wifi_rssi') }} dBm | {{
          states('sensor.aquaclean_proxy_max_wifi_rssi') }} dBm | {{
          states('sensor.aquaclean_proxy_wifi_signal') }} dBm |

          {%- endif %}


          Transport: `{{ states('sensor.geberit_aquaclean_transport') }}`
          &nbsp;·&nbsp; {{ states('sensor.geberit_aquaclean_poll_samples') }}
          samples this session

      # ── Live Status ──────────────────────────────────────────────────────
      - type: entities
        title: Live Status
        icon: mdi:information-outline
        entities:
          - entity: binary_sensor.geberit_aquaclean_is_user_sitting
            name: User Sitting
          - entity: binary_sensor.geberit_aquaclean_is_anal_shower_running
            name: Anal Shower Running
          - entity: sensor.geberit_aquaclean_alba_anal_shower_progress_pct
            name: Anal Shower Progress
          - entity: binary_sensor.geberit_aquaclean_alba_active_oscillation
            name: Spray Arm Oscillation Status

      # ── Controls ──────────────────────────────────────────────────────────
      - type: grid
        title: Controls
        square: false
        columns: 2
        cards:
          - type: button
            name: Toggle Anal Shower
            icon: geberit:analshower
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_toggle_anal_shower
          - type: button
            name: Start Spray Arm Cleaning
            icon: mdi:spray
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_start_stop_spray_arm_cleaning
          - type: button
            name: Sync RTC Clock
            icon: mdi:clock-sync
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_sync_rtc
          - type: button
            name: Restart Alba Device
            icon: mdi:restart
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.geberit_aquaclean_restart_alba_device

      # ── Active Profile Settings ───────────────────────────────────────────
      - type: entities
        title: Anal Shower Profile Settings
        icon: geberit:analshower
        entities:
          - entity: number.geberit_aquaclean_ps_water_temperature
            name: Stored Water Temperature
          - entity: number.geberit_aquaclean_ps_anal_shower_position
            name: Stored Spray Arm Position
          - entity: number.geberit_aquaclean_ps_anal_shower_pressure
            name: Stored Spray Intensity
          - entity: number.geberit_aquaclean_ps_oscillator_state
            name: Stored Oscillation (0=Off, 1=On)
          - type: section
            label: "Live/Active Changes (Alba Only)"
          - entity: number.geberit_aquaclean_alba_active_temperature
            name: Active Water Temperature
          - entity: number.geberit_aquaclean_alba_active_position
            name: Active Spray Position
          - entity: number.geberit_aquaclean_alba_active_intensity
            name: Active Spray Intensity
          - entity: number.geberit_aquaclean_alba_active_oscillation
            name: Active Oscillation Control

      # ── Device Diagnostic & Errors ────────────────────────────────────────
      - type: entities
        title: Alba Status & Device Errors
        icon: mdi:alert-circle-outline
        entities:
          - entity: binary_sensor.geberit_aquaclean_alba_error_maintenance_request
            name: Maintenance Request
          - entity: binary_sensor.geberit_aquaclean_alba_error_power_supply
            name: Power Supply Error
          - entity: binary_sensor.geberit_aquaclean_alba_error_water_heater
            name: Water Heater Error
          - entity: binary_sensor.geberit_aquaclean_alba_error_water_pump
            name: Water Pump Error
          - entity: binary_sensor.geberit_aquaclean_alba_error_spray_arm_drive
            name: Spray Arm Drive Error
          - entity: binary_sensor.geberit_aquaclean_alba_error_user_detection
            name: User Detection Error
          - entity: binary_sensor.geberit_aquaclean_alba_error_level_control
            name: Level Control Error
          - entity: binary_sensor.geberit_aquaclean_alba_error_descaling
            name: Descaling Error
          - entity: sensor.geberit_aquaclean_alba_spray_arm_cleaning_status
            name: Spray Arm Cleaning Status
          - entity: sensor.geberit_aquaclean_alba_spray_arm_cleaning_progress_pct
            name: Spray Arm Cleaning Progress
          - entity: binary_sensor.geberit_aquaclean_alba_demo_mode
            name: Demo Mode
          - entity: binary_sensor.geberit_aquaclean_alba_showroom_mode
            name: Showroom Mode
          - entity: binary_sensor.geberit_aquaclean_alba_dry_run_mode
            name: Dry Run Mode

      # ── Poll Status ───────────────────────────────────────────────────────
      - type: entities
        title: Poll Status
        icon: mdi:timer-outline
        entities:
          - entity: sensor.geberit_aquaclean_next_poll
            name: Next Poll
          - entity: sensor.geberit_aquaclean_poll_epoch
            name: Last Poll
          - entity: sensor.geberit_aquaclean_poll_interval
            name: Poll Interval
          - type: conditional
            conditions:
              - entity: binary_sensor.geberit_aquaclean_ble_connected
                state: "off"
            row:
              type: custom:timer-bar-card
              entity: sensor.geberit_aquaclean_next_poll
              guess_mode: true
              full_row: true
              start_time:
                entity: sensor.geberit_aquaclean_poll_epoch
              end_time:
                entity: sensor.geberit_aquaclean_next_poll
              text: Nächster Poll in {remaining}
              invert: true
              bar_height: 10px
              bar_foreground: var(--state-icon-color)
              bar_background: transparent
              layout: hide_name
          - type: conditional
            conditions:
              - entity: binary_sensor.geberit_aquaclean_ble_connected
                state: "on"
            row:
              type: custom:timer-bar-card
              entity: binary_sensor.geberit_aquaclean_ble_connected
              active_state: "off"
              translations:
                "on": on request
              full_row: true
              layout: hide_name

      # ── Descaling ─────────────────────────────────────────────────────────
      - type: entities
        title: Descale
        icon: geberit:descaling
        entities:
          - entity: sensor.geberit_aquaclean_descaling_state
            name: Descaling State (Global)
          - entity: sensor.geberit_aquaclean_descaling_duration_min
            name: Descaling Duration
          - entity: sensor.geberit_aquaclean_alba_descaling_status
            name: Descaling Status (Alba)
          - entity: sensor.geberit_aquaclean_alba_descaling_progress_pct
            name: Descaling Progress
          - entity: sensor.geberit_aquaclean_days_until_next_descale
            name: Days Until Next Descale
          - entity: sensor.geberit_aquaclean_alba_days_until_next_descaling
            name: Days Until Next Descaling (Alba)
          - entity: sensor.geberit_aquaclean_days_until_shower_restricted
            name: Days Until Shower Restricted
          - entity: sensor.geberit_aquaclean_alba_credits_until_next_descaling
            name: Credits Until Next Descaling
          - entity: sensor.geberit_aquaclean_date_time_at_last_descale
            name: Last Descale
          - entity: sensor.geberit_aquaclean_number_of_descale_cycles
            name: Descale Cycles
          - entity: sensor.geberit_aquaclean_alba_descaling_cycles
            name: Descaling Cycles (Alba)
          - entity: sensor.geberit_aquaclean_shower_cycles_until_confirmation
            name: Shower Cycles Until Confirmation
          - entity: sensor.geberit_aquaclean_unposted_shower_cycles
            name: Unposted Shower Cycles
          - entity: sensor.geberit_aquaclean_alba_unaccounted_shower_cycles
            name: Unaccounted Shower Cycles (Alba)
          - entity: sensor.geberit_aquaclean_alba_timestamp_last_descaling
            name: Timestamp Last Descaling
          - entity: sensor.geberit_aquaclean_alba_timestamp_last_descaling_request
            name: Timestamp Last Descaling Request
          - entity: sensor.geberit_aquaclean_alba_descaling_device_lock_status
            name: Descaling Device Lock Status
          - entity: sensor.geberit_aquaclean_alba_descaling_device_lock_remaining_days
            name: Descaling Lock Remaining Days
          - entity: sensor.geberit_aquaclean_alba_descaling_device_relock_remaining_cycles
            name: Descaling Relock Remaining Cycles
          - type: buttons
            entities:
              - entity: button.geberit_aquaclean_prepare_descaling
                name: Prepare
              - entity: button.geberit_aquaclean_confirm_descaling
                name: Confirm
              - entity: button.geberit_aquaclean_cancel_descaling
                name: Cancel
              - entity: button.geberit_aquaclean_postpone_descaling
                name: Postpone

      # ── Usage Statistics ──────────────────────────────────────────────────
      - type: entities
        title: Usage & Runtime Counters
        icon: mdi:counter
        entities:
          - entity: sensor.geberit_aquaclean_alba_stats_total_usages
            name: Total Uses
          - entity: sensor.geberit_aquaclean_alba_stats_total_anal_showers
            name: Total Anal Shower Uses
          - entity: sensor.geberit_aquaclean_alba_stats_total_lady_showers
            name: Total Lady Shower Uses
          - entity: sensor.geberit_aquaclean_alba_stats_total_dryings
            name: Total Dryer Uses
          - entity: sensor.geberit_aquaclean_alba_stats_total_descalings
            name: Total Descaling Cycles
          - entity: sensor.geberit_aquaclean_alba_stats_total_spray_arm_cleanings
            name: Total Spray Arm Cleanings
          - entity: sensor.geberit_aquaclean_alba_operation_time_total_s
            name: Total Operation Time
          - entity: sensor.geberit_aquaclean_alba_operation_time_since_power_up_s
            name: Operation Time Since Power-Up
          - entity: sensor.geberit_aquaclean_alba_rtc_time
            name: Internal RTC Time

      # ── Device Information ────────────────────────────────────────────────
      - type: entities
        title: Device Information
        icon: mdi:information
        show_header_toggle: false
        entities:
          - entity: sensor.geberit_aquaclean_description
            name: Model
          - entity: sensor.geberit_aquaclean_serial_number
            name: Serial Number
          - entity: sensor.geberit_aquaclean_sap_number
            name: SAP Number
          - entity: sensor.geberit_aquaclean_production_date
            name: Production Date
          - entity: sensor.geberit_aquaclean_initial_operation_date
            name: Initial Operation Date
          - entity: sensor.geberit_aquaclean_soc_versions
            name: SOC Versions
          - entity: sensor.geberit_aquaclean_firmware_version
            name: Firmware Version
          - entity: sensor.geberit_aquaclean_alba_fus_version
            name: FUS Version
          - entity: sensor.geberit_aquaclean_alba_geberit_loader_version
            name: Geberit Loader Version
          - entity: sensor.geberit_aquaclean_alba_wireless_stack_version
            name: Wireless Stack Version
          - entity: sensor.geberit_aquaclean_alba_product_registration_level
            name: Product Registration Level